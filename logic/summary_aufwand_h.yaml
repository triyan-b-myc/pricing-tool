variable_questions: '["b1", "d8", "c1", "c12"]'
constant_questions: '["c2", "b3", "c7", "c9", "c10", "c4", "c6", "c11", "kam", "c19", "c17", "d7", "b8", "c14", "c15"]'

# fn_get_cc is a function. 
# It takes in the name of the question q e.g. b1 and the cost component cc e.g. liz_b
# It returns the value of the variable q_cc, e.g the value of b1_liz_b
# It returns the default d if q_cc does not exist
# qdata holds all the variables and their values
# This enables us to dynamically define which variable to look up, which is not possible with just the $ syntax
# Example usage: $fn_get_cc("b1", $some_other_variable)
fn_get_cc: 'lambda q, cc, d: qdata.get(f"{q}_{cc}", d) if qdata.get(f"{q}_{cc}", d) is not None else d'

fn_get_aufwand: 'lambda cc: math.prod($fn_get_cc(q, cc, 1) for q in $variable_questions) * sum($fn_get_cc(q, cc, 0) for q in $constant_questions)'

fn_sum_aufwand: 'lambda ccs: sum($aw_h[key] for key in ccs)'

# Instead of defining a huge amount of variables for all the cost components, we create a map called aw_h, whose keys are the cost components
# and values are the totals across all questions
aw_h: '{cc: $fn_get_aufwand(cc) for cc in $const_table_cost_components}'

fn_mround: 'lambda a, m: math.floor(a/m + 0.5) * m'
# Convert hours to workdays (nearest 0.25)
fn_htod: 'lambda hrs: $fn_mround(hrs/$const_hours_per_workday, 0.25)'
# Convert hours to cost
fn_htochf: 'lambda hrs: $fn_htod(hrs) * $daily_rate'

### Module summaries (from aw_h)
## A
aw_h_a_ia:                     $fn_sum_aufwand(["a_ia_adv", "a_ia_cust"])

## B
aw_chf_b_liz:                  $fn_sum_aufwand(["liz_b"])

## C (IA)
