aw_h_c_c1_tool_min:            $fn_sum_aufwand(["c1_ia_adv_tool", "c1_ia_events", "c1_ia_cust_tool", "c1_ia_cust_min_customizing", "c1_ia_cust_min_pl"])
aw_h_c_c1_tool_max:            $fn_sum_aufwand(["c1_ia_adv_tool", "c1_ia_cust_tool", "c1_ia_cust_max_customizing", "c1_ia_cust_max_pl"])
aw_h_c_c1_ef_min:              $fn_sum_aufwand(["c1_ia_adv_ef", "c1_ia_cust_min_ef"])
aw_h_c_c1_ef_max:              $fn_sum_aufwand(["c1_ia_adv_ef", "c1_ia_cust_max_ef"])
# C2    
