c4_f2_ms: $c4_c1_ms + $c4_c2_ms + $c4_c3_ms + $c4_c4_ms + $c4_c5_ms  
c4_fx_dl_cust_min_customizing: $c4_c1_ia_cust_min_customizing
c4_fx_dl_cust_max_customizing: $c4_c1_ia_cust_max_customizing
c4_fx_dl_cust_pl: $c4_c1_ia_cust_min_pl
c4_liz_b: |
  0 if $C20 is None else \
  $c4_liz_ia_cust if $C20 == 'CCF Customized' else \
  $c4_liz_ia_adv


### C2
c2_liz_extrajahre: $c4_liz_b * $C2 if $C2 is not None else 0
c2_ia_adv_extrajahre: $C2 or 0
c2_ia_cust_extrajahre: $c2_ia_adv_extrajahre


### C6
c6_multiplier: '[3, 6, 10][$C6] if $C6 is not None else None'
c6_multiplier_cust: '[2, 4, 7][$C6] if $C6 is not None else None'
c6_liz_ia_adv: |
  0 if $C6 is None or $Z4 is None else \
  $const_table_c4_s3_standort_lizenz_adv[$c6_multiplier] if $Z4 == 0 else \
  $c6_multiplier * 50
c6_liz_dl_adv: $c6_liz_ia_adv
c6_c1_ia_adv_tool: $fn_c1_ia_adv_tool($c6_multiplier)
c6_c5_ia_adv: '0'
c6_c1_dl_adv_tool: $c6_c1_ia_adv_tool
c6_c5_dl_adv: '0'
# Formula does not match excel
c6_liz_ia_cust:  |
  0 if $C6 is None or $Z4 is None else \
  $const_table_c4_s3_standort_lizenz_cust[$c6_multiplier] if $Z4 == 0 else \
  $c6_multiplier * 50
c6_liz_dl_cust: $c6_liz_ia_cust
c6_c1_ia_cust_tool: $fn_c1_ia_cust_tool($c6_multiplier_cust)
c6_c5_ia_cust_min: '[2, 4, 8][$C6] if $C6 is not None else 0'
c6_c5_ia_cust_max: '[3, 5, 9][$C6] if $C6 is not None else 0'
c6_c1_dl_cust_tool: 0.75*$fn_c1_ia_adv_tool($c6_multiplier_cust)
c6_c5_dl_cust_min: '[2, 4, 8][$C6] if $C6 is not None else 0'
c6_c5_dl_cust_max: '[3, 5, 9][$C6] if $C6 is not None else 0'


### C9
# Missing data?
c9_c1_ia_cust_min_kategorisierung: '0'
c9_c1_ia_cust_max_kategorisierung: $c9_c1_ia_cust_min_kategorisierung 
c9_c1_dl_cust_min_kategorisierung: $c9_c1_ia_cust_min_kategorisierung
c9_c1_dl_cust_max_kategorisierung: $c9_c1_ia_cust_min_kategorisierung


### C11
c11_c1_ia_adv_tool: '[0, 1, 2][$C11] if $C11 is not None else 0'
c11_c1_dl_adv_tool: '0'
c11_c1_ia_cust_tool: $c11_c1_ia_adv_tool
c11_c1_dl_cust_tool: $c11_c1_dl_adv_tool


### C12
c12_c1_ms: 1 if $C12 == 0 else 0
c12_c2_ms: $c12_c1_ms
c12_c3_ms: $c12_c1_ms
c12_c4_ms: $c12_c1_ms
c12_c5_ms: $c12_c1_ms
c12_f2_ms: $c12_c1_ms


### KAM (Z6)
kam_cmt_team_skalierung_c1_ia_cust: '[0.9, 1, 1.1][$Z6] if $Z6 is not None else 1'
kam_skalierung_c2_ia_cust: '1'
kam_skalierung_c3_ia_cust: '[0.8, 1, 1.2][$Z6] if $Z6 is not None else 1'
kam_skalierung_c4_ia_cust: $kam_skalierung_c3_ia_cust
kam_skalierung_c5_ia_cust: $kam_skalierung_c3_ia_cust
kam_cmt_team_skalierung_c1_dl_cust: $kam_cmt_team_skalierung_c1_ia_cust
kam_skalierung_c2_dl_cust: $kam_skalierung_c2_ia_cust
kam_skalierung_c3_dl_cust: $kam_skalierung_c3_ia_cust
kam_skalierung_c4_dl_cust: $kam_skalierung_c3_ia_cust
kam_skalierung_c5_dl_cust: $kam_skalierung_c3_ia_cust

kam_c1_ia_cust_tool: -1 * (1 - $kam_cmt_team_skalierung_c1_ia_cust) * $c4_c1_ia_cust_tool
kam_c2_ia_cust_max: -1 * (1 - $kam_skalierung_c2_ia_cust) * $c4_c2_ia_cust_max
kam_c2_ia_cust_min: -1 * (1 - $kam_skalierung_c2_ia_cust) * $c4_c2_ia_cust_min
kam_c3_ia_cust: -1 * (1 - $kam_skalierung_c3_ia_cust) * $c4_c3_ia_cust
kam_c4_ia_cust_max: -1 * (1 - $kam_skalierung_c4_ia_cust) * $c4_c4_ia_cust_max
kam_c4_ia_cust_min: -1 * (1 - $kam_skalierung_c4_ia_cust) * $c4_c4_ia_cust_min
kam_c5_ia_cust_max: -1 * (1 - $kam_skalierung_c5_ia_cust) * $c4_c5_ia_cust_max
kam_c5_ia_cust_min: -1 * (1 - $kam_skalierung_c5_ia_cust) * $c4_c5_ia_cust_min
kam_c1_dl_cust_tool: -1 * (1 - $kam_cmt_team_skalierung_c1_dl_cust) * $c4_c1_dl_cust_tool
kam_c2_dl_cust_max: -1 * (1 - $kam_skalierung_c2_dl_cust) * $c4_c2_dl_cust_max
kam_c2_dl_cust_min: -1 * (1 - $kam_skalierung_c2_dl_cust) * $c4_c2_dl_cust_min
kam_c3_dl_cust: -1 * (1 - $kam_skalierung_c3_dl_cust) * $c4_c3_dl_cust
kam_c4_dl_cust_max: -1 * (1 - $kam_skalierung_c4_dl_cust) * $c4_c4_dl_cust_max
kam_c4_dl_cust_min: -1 * (1 - $kam_skalierung_c4_dl_cust) * $c4_c4_dl_cust_min
kam_c5_dl_cust_max: -1 * (1 - $kam_skalierung_c5_dl_cust) * $c4_c5_dl_cust_max
kam_c5_dl_cust_min: -1 * (1 - $kam_skalierung_c5_dl_cust) * $c4_c5_dl_cust_min


### C19
c19_liz_ia_print_gold: |
  0 if $C19 in [None, 1] else \
  -1*$c4_liz_ia_print_gold
c19_c5_ia_print_gold: |
  0 if $C19 in [None, 1] else \
  2 if $B4 == 0 or $C16 == 0 else \
  0
c19_liz_dl_print_gold: |
  0 if $C19 in [None, 1] else \
  -1*$c4_liz_dl_print_gold
c19_c5_dl_print_gold: $c19_c5_ia_print_gold


### D8_CCF
d8_a_ia_cust: |
  (1 if $C20 == 'CCF Customized' else 0) if $D8 == 0 else \
  1
d8_fx_dl_cust: |
  (4 if $C20 == 'CCF Advanced' and $C21 == 'CCF Customized' else 0) if $D8 == 0 else \
  0 if $D8 == 1 else \
  1 


### C17
c17_c4_ia_cust_min_flag: 6 if $C17 == 0 else 0
c17_c4_ia_cust_max_flag: 6.5 if $C17 == 0 else 0
c17_c4_dl_cust_min_flag: $c17_c4_ia_cust_min_flag
c17_c4_dl_cust_max_flag: $c17_c4_ia_cust_max_flag


### D7_CCF
d7_c4_ia_cust_min_flag: 6 if $C17 is None and $D7 == 0 else 0
d7_c4_ia_cust_max_flag: 6.5 if $C17 is None and $D7 == 0 else 0
d7_c4_dl_cust_min_flag: $d7_c4_ia_cust_min_flag
d7_c4_dl_cust_max_flag: $d7_c4_ia_cust_max_flag


### B8
b8_c5_ia_cust_min: 2 if $B8 == 0 and ($B4 == 0 or $C16 == 0) else 0
b8_c5_dl_cust_min: $b8_c5_ia_cust_min


### C14
c14_c5_ia_adv_kb: 16 if $C14 == 0 else 0
c14_c5_dl_adv_kb: 12 if $C14 == 0 else 0
c14_c5_ia_cust_min_kb: 16 if $C14 == 0 else 0
c14_c5_ia_cust_max_kb: 24 if $C14 == 0 else 0
c14_c5_dl_cust_min_kb: 12 if $C14 == 0 else 0
c14_c5_dl_cust_max_kb: 16 if $C14 == 0 else 0


### C15
c15_c5_ia_adv_kb: 4 if $C15 == 0 else 0
c15_c5_dl_adv_kb: 2 if $C15 == 0 else 0
c15_c5_ia_cust_min_kb: 16 if $C15 == 0 else 0
c15_c5_ia_cust_max_kb: 24 if $C15 == 0 else 0
c15_c5_dl_cust_min_kb: 12 if $C15 == 0 else 0
c15_c5_dl_cust_max_kb: 16 if $C15 == 0 else 0

