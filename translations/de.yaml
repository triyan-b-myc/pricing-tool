questionnaire:
  title: Pricing Tool Questionnaire
  description: All visible questions are mandatory. 
  empty_section: "No questions for this section"
  sections:
    Z:
      title: Initial Information 
      qs: 
        Z1:
          text: Company name
        Z2:
          text: myclimate CPM name
        Z3:
          text: myclimate country
        Z4:
          text: myclimate tool
        Z5:
          text: Proportion of project management (%)
        Z6:
          text: Estimated support level
        Z7:
          text: Expected effort until contract conclusion (h)
    A:
      title: "A: Company Profile"
      qs:
        A1:
          text: myclimate sector
    B:
      title: "B: myclimate Services"
      qs:
        B1:
          text: Should a corporate carbon footprint be created?
          description: The Corporate Carbon Footprint (CCF) is an important part of myclimate's comprehensive customer advisory service. The footprint provides an overview of emissions in the company and its value chain. The CCF is the basis for the development of measures, greenhouse gas reduction targets or the climate strategy as a whole.
        B2:
          text: Should the corporate carbon footprint include all three scopes entirely?
          description: In general a complete CCF is recommended. This is mandatory for CSRD or SBTi validation, with the exception of SMEs that only want to set short-term SBTs. For solutions with incomplete balance sheets (CCF  Advanced, CCF Print, Hotel, Events), no in-depth analyses, no adjustments no additional categories or no additional emission factors are possible.
        B3:
          text: Is a Corporate Carbon Footprint (CCF) already available from a previous or current year?
        B4:
          text: Would you like support in setting greenhouse gas reduction targets with the Science Based Targets initiative (SBTi)?
          description: myclimate offers support in the development, submission and validation of SBTi-compliant climate targets. Advice on measures is not included in the SBTi advisory service product, but can be combined if desired.
        B5:
          text: Would you like support in developing measures to reduce your greenhouse gas footprint?
          description: myclimate supports the definition of tangible reduction targets, the identification of possible hotspots and improvement potentials as well as the development of measures for CO2 reduction within the value chain. Existing corporate carbon footprints and consultations provide the starting point for this. As part of the mapping workshop, the level of detail for the development of measures is defined together with the customer.
        B6:
          text: Would you like support in relation to CSRD reporting requirements?
          description: The CSRD reporting product aims to navigate companies through the challenges and opportunities of the Corporate Sustainability Reporting Directive (CSRD). myclimate offers a structured, modular approach to integrating environmental, social and governance (ESG) criteria into companies' core strategies, not only to ensure compliance but also to create sustainable values within the company.
        B7:
          text: Would you like support with CDP-compliant reporting?
          description: The Carbon Disclosure Project (CDP) is an international non-profit organization that descriptions companies, cities, states, regions and authorities to disclose their environmental impact. CDP maintains a widely used database of information on the environmental impacts of companies, including global greenhouse gas emissions.
        B8:
          text: Would you like to receive the myclimate Impact Label?
    C_profile:
      title: "C: CCF Profile"
      qs:
        C1:
          text: Should a corporate carbon footprint for additional, earlier years be calculated?
          description: A discount of 20% on CCF Customized and 30% on CCF Advanced is granted for simultaneous processing. This is already included in the pricing tool.
        C2:
          text: How many additional years are calculated?
        C3:
          text: What types of sites are analysed / what type of company is it?
          description: What activities / types of locations are involved in this company
        C4:
          text: How many individually analysable sites / events should be reflected in the corporate carbon footprint?
          description: Please enter the number of "nodes"
        C5:
          text: Should certain individually analysable locations be divided into subgroups of the company group?
          description: "This is the level of detail of the results / emissions. At which organizational level would the company like to be able to review these? (Example: only consolidated, per entity, per location...) Note: data entry must also be possible at this level."
        C6:
          text: How many such subgroups should be created? 
        C7:
          text: How many different raw materials/goods/groceries are purchased for operations?
        C8:
          text: Would you like to calculate and register the goods/materials individually in the tool or should they be clustered in goods groups/material groups?
          description: |
            Example: All purchase items for milk, milk drink, whole milk, etc. can be recorded in EcoCloud as 'milk' or individually.

            Example 2: All polyester products and proportions of mixed fibres can be grouped together under polyester or, if required by the customer, also recorded as polyester shirts, polyester socks, 50/50 polyester-cotton shirts or similar.
        C9:
          text: Should myclimate assign the raw materials / products / food data to the together defined product groups? (This is a additional service as part of the annual data collection)
          description: For example, myclimate can assign all different types of pizza to the category 'Pizza'.
        C10:
          text: "If known: For how many products would you like to calculate a customised emission factor that reflects your exact processes or materials?"
        C11:
          text: How many people are expected to collect data?
        C12:
          text: Would you like to use the myclimate mobility survey (employee commuting)?
          description: "Within the process of your CCF calculation you can choose to calculate the emissions in Scope 3.7 on the commuting behaviour of your employees with the mobility survey of myclimate."
    C_reporting:
      title: "C: CCF Reporting"
      qs:
        C13:
          text: Does the CCF require an external audit?
        C14:
          text: Would you like a detailed climate report?
          description: |
            Detailed report on the CCF (10-20 pages):
              - Brief description of methodology
              - Data quality
              - Analysis of input data
              - Analysis of results
        C15:
          text: Would you like an additional, detailed methodology report?
          description: |
            Ausführlicher Methodikbericht (in Berichtsform):
              - General Information
              - Accounting of Climate Impact
              - System Boundary
              - CCF Customized: Data inventory and calculation methodology (in detail)
              - CCF Advanced: general validation process and modelling of data gaps
        C16:
          text: Does the CCF need to be in compliance with STBi-requirements?
        C17:
          text: Is the company engaged in business activities related to Forest, Land and Agriculture (FLAG)?
    C_print:
      title: "C: CCF Print"
      qs:
        C18:
          text: Would you like to choose the bronze, silver or gold print solution?
          description: |
            Bronze: Basic communication partnership (workshop for sales staff, materials and myclimate label), as well as myclimate Calculate

            Silver: Basic communication partnership, myclimate Calculate, CCF creation in EcoCloud, CO2 summary

            Gold: Extended communication partnership, myclimate Calculate, CCF creation and a detailed environmental performance indicator report
        C19:
          text: Would you like to donate to climate protection projects instead of myclimate calculate to the extent of the emissions caused and receive the impact label "Effective sustainability"?
          description: By participating in the label program, the option for myclimate Calculate is no longer available, as the printing company itself supports climate protection projects equivalent to its emissions.
    D:
      title: "D: Science Based Targets Initiative (SBTi)"
      qs:
        D1:
          text: Type of company (e.g. limited liability company, public institution, NGO,...)
          description: Cities, local governments, public institutions, educational and research institutions, and non-profits cannot currently set SBTi targets
        D2:
          text: Does the company want to set near-term targets?
          description: Short-term targets are limited to a period of 5-10 years from the year of submission. Setting near-term targets is a mandatory prerequisite for setting an optional net-zero target.
        D3:
          text: Does the company want to set net zero / long-term targets?
          description: Net-zero targets must be achieved by 2050 at the latest. It is not possible to set net-zero targets without also defining near-term targets.
        D4:
          text: Would you like support in submitting your goals?
          description: This service includes the completion of the specified submission documents from SBTi.
        D5:
          text: Are there already clear ideas for these targets? (target year)
          description: After submitting the targets, you will be allocated a 30-day validation window during which SBTi will check your targets and data. Any questions from SBTi must be answered within 2 working days. myclimate supports the company in this process.
        D6:
          text: Would you like support with monitoring?
          description: According to SBTi, companies must calculate the CCF in accordance with the GHG Protocol annually and report publicly on progress compared to the published targets. myclimate ensures the SBTi conformity of the CCF, the comparability with last year's CCFs and the existing validity of the SBTi targets. At the same time, target achievement is reviewed and the impact of the measures analyzed. 
        D8:
          text: Would you like to submit your targets as an SME?
          description: It is also possible to submit as a large company, for example if the company will no longer meet the SME criteria within the next few years and wants to prevent an early target resubmission
        D7:
          text: Are you required to set targets according to the FLAG Guidance?
    E:
      title: "E: Consulting on measures"
      qs:
        E1:
          text: Do greenhouse gas reduction targets already exist for the company? (internal or external, SBTi defined or planned)
        E2:
          text: Would you like a review or a more detailed elaboration of existing greenhouse gas reduction targets?
        E3:
          text: Would you like greenhouse gas reduction targets to be developed?
          description: If greenhouse gas reduction targets are developed within an SBTi consultation process already, select "No"
        E4:
          text: Would you like to develop / further elaborate measures / action plans?
          description: myclimate supports you in setting tangible greenhouse gas reduction targets, identifying possible hotspots and improvement potentials, and developing measures for CO2  emission reduction within your value chain.
        E5:
          text: For how many business units or locations should the measures be developed?
          description: "Note: If there are more than three business areas, the effort involved increases"
        E6:
          text: Would you like the calculation of reduction potentials and reduction paths?
          description: Reduction paths show the timing of greenhouse gas reduction based on action plans.
        E7:
          text: Do documents need to be available in both languages (English and German)?
        E8:
          text: Would you like to hold workshops with various stakeholders to develop measures?
          description: Possible stakeholders are employees, management, customers, investors, partners, suppliers, etc.
        E9:
          text: How many workshops would you like to hold with stakeholders?
        E10:
          text: Would you like a monitoring concept for an existing or future action plan?
          description: A monitoring concept ensures the traceability and comparability of CCFs over subsequent years. It illustrates the impact of the measures implemented and provides an overview of the degree to which targets have been achieved. The measures implemented are analyzed and the reductions achieved are compared with the action plan and target and updated where necessary.
        E11:
          text: Do you want to develop your own climate protection projects in your value chain (insetting)?
          description: Supply chain projects are climate protection projects financed by the company that demonstrably reduce or sequester emissions in the company's upstream or downstream value chain (Scope 3 emissions). This is frequently implemented as a part of a Scope 3 reduction target, e.g. an SBTi commitment. The implementation of supply chain projects can be summarized under the term "insetting" according to the definition of the International Platform for Insetting (IPI, April 2022).
      
